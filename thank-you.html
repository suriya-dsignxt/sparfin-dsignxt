<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You – SPARFIN Services</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">
    <!-- DM Sans Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- DotLottie Player -->
    <script src="https://unpkg.com/@dotlottie/player-component@latest/dist/dotlottie-player.mjs" type="module"></script>
    <style>
        :root {
            --navy: #231191;
            --navy2: #14085F;
            --gold: #31CA83;
            --white: #FFFFFF;
            --text: #19214F;
            --text2: #55637C;
            --green: #23B874;
            --accent-rgb: 49,202,131;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--white);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
            overflow: hidden;
            background: 
                radial-gradient(circle at 0% 0%, rgba(49, 202, 131, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(35, 17, 145, 0.06) 0%, transparent 40%),
                #fff;
        }

        .thank-you-card {
            max-width: 640px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            padding: 60px 40px;
            border-radius: 40px;
            box-shadow: 
                0 40px 100px rgba(35, 17, 145, 0.08),
                0 0 1px rgba(35, 17, 145, 0.1);
            backdrop-filter: blur(20px);
            border: 1.5px solid rgba(49, 202, 131, 0.15);
            position: relative;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .lottie-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            font-size: 2.8rem;
            color: var(--navy);
            margin-bottom: 20px;
            font-weight: 700;
            letter-spacing: -0.03em;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.4s forwards;
        }

        p {
            font-size: 1.15rem;
            color: var(--text2);
            line-height: 1.8;
            margin-bottom: 44px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.6s forwards;
        }

        .redirect-notice {
            font-size: 0.9rem;
            color: var(--text2);
            opacity: 0.7;
            margin-top: 30px;
            animation: fadeIn 0.8s ease-out 1s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .cta-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            opacity: 0;
            animation: fadeIn 0.8s ease-out 0.8s forwards;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 16px 32px;
            border-radius: 99px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--navy);
            color: #fff;
            box-shadow: 0 10px 30px rgba(35, 17, 145, 0.15);
        }

        .btn-primary:hover {
            background: var(--navy2);
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(35, 17, 145, 0.2);
        }

        .btn-whatsapp {
            background: #25D366;
            color: #fff;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.15);
        }

        .btn-whatsapp:hover {
            background: #1ead52;
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(37, 211, 102, 0.2);
        }

        @media (max-width: 576px) {
            .thank-you-card { padding: 40px 24px; border-radius: 32px; }
            h1 { font-size: 2.1rem; }
            p { font-size: 1rem; }
            .lottie-container { width: 120px; height: 120px; }
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <div class="lottie-container">
            <dotlottie-player 
                src="https://lottie.host/9b85edc4-42f4-406e-826a-93e116bc37e8/2A48K34qZ6.json" 
                background="transparent" 
                speed="1" 
                style="width: 100%; height: 100%;" 
                autoplay>
            </dotlottie-player>
        </div>

        <h1>Success!</h1>
        <p>Thank you for reaching out to <strong>SPARFIN Services</strong>. Your enquiry has been received. Our senior advisor team will reach out within the next 24 hours.</p>
        
        <div class="cta-group">
            <a href="https://wa.me/919381743934?text=Hi%20SPARFIN,%20I%20just%20submitted%20my%20loan%20enquiry%20via%20the%20website.%20" class="btn btn-whatsapp">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                Chat on WhatsApp now
            </a>
            <a href="index.html" class="btn btn-primary">
                Return to Home
            </a>
        </div>

        <p class="redirect-notice">Returning to home page in <span id="countdown">15</span>s...</p>
    </div>

    <script>
        let timeLeft = 15;
        const countdownEl = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>

</body>
</html>
